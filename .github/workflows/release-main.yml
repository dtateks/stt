name: Release on main push

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release-meta.outputs.tag }}
      release_name: ${{ steps.release-meta.outputs.release_name }}
      build_matrix: ${{ steps.release-meta.outputs.build_matrix }}
    steps:
      - name: Build release plan for this push
        id: release-meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          local_tag="local-${short_sha}"
          local_asset="Voice-to-Text-darwin-arm64.zip"
          local_release_ready="false"

          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${local_tag}" >/dev/null 2>&1; then
            echo "Found ${local_tag}; waiting for local arm64 release asset…"

            for attempt in $(seq 1 18); do
              release_assets="$(gh release view "$local_tag" --repo "$GITHUB_REPOSITORY" --json assets -q '.assets[].name' 2>/dev/null || true)"

              if printf '%s\n' "$release_assets" | grep -qx "$local_asset"; then
                local_release_ready="true"
                break
              fi

              sleep 10
            done
          fi

          if [[ "$local_release_ready" == "true" ]]; then
            tag="$local_tag"
            build_matrix='{"include":[{"arch":"x64","runner":"macos-15-intel","asset_name":"Voice-to-Text-darwin-x64.zip"}]}'
          else
            tag="main-${GITHUB_RUN_NUMBER}-${short_sha}"
            build_matrix='{"include":[{"arch":"arm64","runner":"macos-15","asset_name":"Voice-to-Text-darwin-arm64.zip"},{"arch":"x64","runner":"macos-15-intel","asset_name":"Voice-to-Text-darwin-x64.zip"}]}'
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_name=Voice to Text $tag" >> "$GITHUB_OUTPUT"
          echo "build_matrix=$build_matrix" >> "$GITHUB_OUTPUT"

  build-macos:
    name: Build ${{ matrix.arch }} macOS bundle
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-release.outputs.build_matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app bundle
        run: npm run build

      - name: Sign macOS app bundle with entitlements
        run: ./scripts/sign-macos-app.sh "src/target/release/bundle/macos/Voice to Text.app" "src/Entitlements.plist"

      - name: Verify signed macOS entitlements
        run: |
          app_path="src/target/release/bundle/macos/Voice to Text.app"
          entitlements_path="$RUNNER_TEMP/entitlements.txt"

          codesign --verify --verbose=2 "$app_path"
          codesign -d --entitlements - "$app_path" 2>&1 | tee "$entitlements_path"
          grep -q "com.apple.security.device.audio-input" "$entitlements_path"
          grep -q "com.apple.security.automation.apple-events" "$entitlements_path"

      - name: Package app bundle as stable zip asset
        run: |
          app_path="src/target/release/bundle/macos/Voice to Text.app"
          if [ ! -d "$app_path" ]; then
            echo "Missing app bundle: $app_path" >&2
            exit 1
          fi

          ditto -c -k --keepParent --sequesterRsrc "$app_path" "${{ matrix.asset_name }}"

      - name: Package updater artifacts
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          updater_archive_asset="Voice-to-Text-darwin-${{ matrix.arch }}.app.tar.gz"
          updater_signature_asset="${updater_archive_asset}.sig"
          bundle_dir="src/target/release/bundle/macos"
          app_name="Voice to Text.app"

          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "Missing TAURI_SIGNING_PRIVATE_KEY secret" >&2
            exit 1
          fi

          COPYFILE_DISABLE=1 tar -czf "$updater_archive_asset" -C "$bundle_dir" "$app_name"
          npx tauri signer sign "$updater_archive_asset"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.arch }}
          path: |
            Voice-to-Text-darwin-${{ matrix.arch }}.app.tar.gz
            Voice-to-Text-darwin-${{ matrix.arch }}.app.tar.gz.sig
          if-no-files-found: ignore

  build-windows:
    name: Build Windows NSIS installer
    needs: prepare-release
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Windows NSIS installer
        env:
          TAURI_APP_PATH: src
        run: npx tauri build --bundles nsis

      - name: Package Windows installer as stable exe asset
        shell: pwsh
        run: |
          $bundleDir = "src/target/release/bundle/nsis"
          if (-not (Test-Path $bundleDir)) {
            throw "Missing NSIS bundle directory: $bundleDir"
          }

          $installers = Get-ChildItem -Path $bundleDir -Filter "*-setup.exe"
          if ($installers.Count -eq 0) {
            throw "Missing NSIS installer in: $bundleDir"
          }

          if ($installers.Count -ne 1) {
            throw "Expected exactly one NSIS installer in $bundleDir but found $($installers.Count)"
          }

          Copy-Item $installers[0].FullName "Voice-to-Text-windows-x64-setup.exe"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: Voice-to-Text-windows-x64-setup.exe
          path: Voice-to-Text-windows-x64-setup.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - prepare-release
      - build-macos
      - build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate merged updater manifest
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          RELEASE_REPOSITORY: ${{ github.repository }}
        run: |
          release_dir="release-assets"
          mkdir -p "$release_dir"

          resolve_asset() {
            local output_var="$1"
            shift
            local candidate

            for candidate in "$@"; do
              if [ -f "$release_dir/$candidate" ]; then
                printf -v "$output_var" '%s' "$candidate"
                return 0
              fi

              if gh release download "$RELEASE_TAG" --repo "$RELEASE_REPOSITORY" --pattern "$candidate" --dir "$release_dir" --clobber >/dev/null 2>&1; then
                if [ -f "$release_dir/$candidate" ]; then
                  printf -v "$output_var" '%s' "$candidate"
                  return 0
                fi
              fi
            done

            printf -v "$output_var" '%s' ''
            return 1
          }

          arm64_archive_asset=""
          arm64_signature_asset=""
          x64_archive_asset=""
          x64_signature_asset=""

          resolve_asset arm64_archive_asset \
            "Voice-to-Text-darwin-arm64.app.tar.gz" \
            "Voice to Text.app.tar.gz" || true
          resolve_asset arm64_signature_asset \
            "Voice-to-Text-darwin-arm64.app.tar.gz.sig" \
            "Voice to Text.app.tar.gz.sig" || true
          resolve_asset x64_archive_asset \
            "Voice-to-Text-darwin-x64.app.tar.gz" || true
          resolve_asset x64_signature_asset \
            "Voice-to-Text-darwin-x64.app.tar.gz.sig" || true

          arm64_signature=""
          x64_signature=""

          if [ -n "$arm64_signature_asset" ]; then
            arm64_signature="$(tr -d '\r\n' < "$release_dir/$arm64_signature_asset")"
          fi

          if [ -n "$x64_signature_asset" ]; then
            x64_signature="$(tr -d '\r\n' < "$release_dir/$x64_signature_asset")"
          fi

          if [ -z "$arm64_signature" ] && [ -z "$x64_signature" ]; then
            echo "No updater signatures found; skipping latest.json generation."
            exit 0
          fi

          version="$(node -e 'const fs=require("node:fs"); const config=JSON.parse(fs.readFileSync("src/tauri.conf.json", "utf8")); process.stdout.write(String(config.version));')"
          pub_date="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          RELEASE_TAG="$RELEASE_TAG" \
          RELEASE_REPOSITORY="$RELEASE_REPOSITORY" \
          RELEASE_DIR="$release_dir" \
          VERSION="$version" \
          PUB_DATE="$pub_date" \
          ARM64_ARCHIVE_ASSET="$arm64_archive_asset" \
          ARM64_SIGNATURE="$arm64_signature" \
          X64_ARCHIVE_ASSET="$x64_archive_asset" \
          X64_SIGNATURE="$x64_signature" \
          node -e 'const fs=require("node:fs"); const path=require("node:path"); const releaseTag=process.env.RELEASE_TAG; const repo=process.env.RELEASE_REPOSITORY; const releaseDir=process.env.RELEASE_DIR; const version=process.env.VERSION; const pubDate=process.env.PUB_DATE; const arm64Archive=process.env.ARM64_ARCHIVE_ASSET || ""; const arm64Signature=process.env.ARM64_SIGNATURE || ""; const x64Archive=process.env.X64_ARCHIVE_ASSET || ""; const x64Signature=process.env.X64_SIGNATURE || ""; const platforms={}; if (arm64Archive && arm64Signature) { platforms["darwin-aarch64"] = { signature: arm64Signature, url: `https://github.com/${repo}/releases/download/${releaseTag}/${arm64Archive.replace(/ /g, "%20")}` }; } if (x64Archive && x64Signature) { platforms["darwin-x86_64"] = { signature: x64Signature, url: `https://github.com/${repo}/releases/download/${releaseTag}/${x64Archive.replace(/ /g, "%20")}` }; } const manifest={ version, notes: "", pub_date: pubDate, platforms }; fs.writeFileSync(path.join(releaseDir, "latest.json"), JSON.stringify(manifest, null, 2) + "\n");'

      - name: Create release and upload stable assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: ${{ needs.prepare-release.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          prerelease: false
          make_latest: true
          generate_release_notes: true
          overwrite_files: true
          files: |
            release-assets/*.zip
            release-assets/*.exe
            release-assets/*.app.tar.gz
            release-assets/*.app.tar.gz.sig
            release-assets/latest.json

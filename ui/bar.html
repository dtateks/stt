<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' wss://stt-rt.soniox.com; media-src 'none'"
    />
    <title>Voice to Text</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="bar-styles.css" />
  </head>
  <body>
    <div id="bar" class="bar hidden">
      <div class="bar-status" aria-hidden="true">
        <div id="bar-indicator" class="bar-indicator"></div>
        <canvas id="waveform" class="bar-waveform" width="96" height="24"></canvas>
      </div>

      <div id="transcript" class="bar-transcript">
        <span id="transcript-text" class="bar-transcript-text"></span>
      </div>

      <div class="bar-actions">
        <button type="button" id="gear-btn" class="bar-btn" aria-label="Settings">
          <svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="10" cy="10" r="3"/>
            <path d="M10 2v2m0 12v2M2 10h2m12 0h2m-3.17-4.83l-1.42 1.42M5.59 14.41l-1.42 1.42m0-9.66l1.42 1.42m7.07 7.07l1.42 1.42"/>
          </svg>
        </button>
        <button type="button" id="close-btn" class="bar-btn" aria-label="Stop and close">
          <svg viewBox="0 0 20 20" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <line x1="4" y1="4" x2="16" y2="16"/>
            <line x1="16" y1="4" x2="4" y2="16"/>
          </svg>
        </button>
      </div>
    </div>

    <script src="stt.js"></script>
    <script src="stopword.js"></script>
    <script src="soniox-defaults.js"></script>
    <script src="bar-renderer.js"></script>
  </body>
</html>

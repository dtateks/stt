<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice to Text — HUD</title>
    <style>
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: transparent;
        border-radius: 24px;
      }

      body {
        position: fixed;
        inset: 0;
      }

      #hud {
        position: fixed;
        inset: 0;
        border-radius: 24px;
      }
    </style>
    <script type="module" src="./src/bar.ts"></script>
  </head>
  <body>
    <!--
      Floating HUD bar.

      Non-focusable by default (native), always-on-top, borderless.
      State is driven by bar.ts via BarSessionController.
      data-state attribute reflects BarState and drives all CSS transitions.

      Accessibility design:
      - The HUD root uses role="status" (implicit aria-live="polite") for the
        overall bar status, but aria-live is NOT set here to avoid over-announcing
        every child text change. The transcript region owns the live announcement.
      - Transcript content area carries aria-live="polite" so AT announces only
        when spoken text or error messages change, not on every state transition.
      - Decorative elements (status dot, waveform, state label, separator) are
        aria-hidden to prevent noise.
      - Buttons are tabindex="-1" in PASSIVE overlay mode (click-through); bar.ts
        raises them to tabindex="0" when entering INTERACTIVE mode.
    -->
    <div
      id="hud"
      class="hud"
      role="status"
      aria-label="Voice to Text status"
      data-state="HIDDEN"
    >
      <!-- Status indicator dot -->
      <span
        id="hud-status"
        class="hud-status"
        aria-hidden="true"
      ></span>

      <!-- Waveform visualization -->
      <div class="hud-waveform" aria-hidden="true">
        <canvas id="waveform"></canvas>
      </div>

      <!-- Transcript content area — owns the live region announcement -->
      <div class="hud-transcript" aria-live="polite" aria-atomic="false">
        <span
          id="transcript-final"
          class="transcript-final"
          aria-label="Transcribed text"
        ></span>
        <span
          id="transcript-interim"
          class="transcript-interim"
          aria-label="Interim transcription"
        ></span>
        <span
          id="transcript-prompt"
          class="transcript-prompt"
          aria-hidden="true"
          hidden
        >Listening…</span>
      </div>

      <!-- State label -->
      <span
        id="hud-state-label"
        class="hud-state-label"
        aria-hidden="true"
      ></span>

      <div class="hud-sep" aria-hidden="true"></div>

      <!-- Controls — tabindex managed by bar.ts: -1 in PASSIVE, 0 in INTERACTIVE -->
      <div class="hud-actions" role="group" aria-label="HUD controls">
        <button
          id="hud-settings-btn"
          class="hud-btn"
          type="button"
          aria-label="Open settings"
          tabindex="-1"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>

        <button
          id="hud-close-btn"
          class="hud-btn hud-btn-close"
          type="button"
          aria-label="Stop listening and close"
          tabindex="-1"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>
  </body>
</html>

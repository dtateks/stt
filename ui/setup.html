<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none'; media-src 'none'"
    />
    <title>Voice to Text — Setup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="setup-container">
      <!-- App icon -->
      <div class="setup-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>

      <!-- Header -->
      <div class="setup-header">
        <h1>Voice to Text</h1>
        <p class="setup-subtitle">Enter your API keys to get started.</p>
      </div>

      <!-- Form -->
      <form class="setup-form" id="setup-form">
        <div class="setup-field">
          <label for="xai-key">xAI API Key</label>
          <input
            type="password"
            id="xai-key"
            placeholder="xai-..."
            spellcheck="false"
            autocomplete="off"
          />
        </div>

        <div class="setup-field">
          <label for="soniox-key">Soniox API Key</label>
          <input
            type="password"
            id="soniox-key"
            placeholder="soniox-..."
            spellcheck="false"
            autocomplete="off"
          />
        </div>

        <div id="setup-error" class="setup-error hidden" role="alert" aria-live="polite"></div>

        <button type="submit" id="save-btn" class="setup-save-btn">Save &amp; Start</button>
      </form>

      <!-- Footnote -->
      <p class="setup-footnote">
        Keys are stored in plain JSON at
        <code>~/Library/Application Support/voice-to-text/credentials.json</code>.<br />
        The app also reads <code>XAI_API_KEY</code> and <code>SONIOX_API_KEY</code> from your shell environment.
      </p>
    </div>

    <script src="setup.js"></script>
  </body>
</html>

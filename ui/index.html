<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none'; media-src 'none'"
    />
    <title>Voice to Text</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <!-- Drag handle -->
      <div class="drag-bar">
        <div class="drag-pill"></div>
      </div>

      <!-- Settings sections -->
      <div class="app-section">
        <div class="section-label">Transcription</div>

        <!-- Enter Mode -->
        <div class="toggle-row" role="group" aria-labelledby="enter-mode-label">
          <div class="toggle-row-left">
            <span class="toggle-row-title" id="enter-mode-label">Enter Mode</span>
            <span class="toggle-row-desc">Send Enter after inserting text</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="enter-mode-toggle" checked />
            <span class="toggle-slider"></span>
          </label>
        </div>

        <!-- Output Language -->
        <div class="toggle-row" role="group" aria-labelledby="output-lang-label">
          <div class="toggle-row-left">
            <span class="toggle-row-title" id="output-lang-label">Output Language</span>
          </div>
          <select id="output-lang-select" class="select-input">
            <option value="auto">Auto</option>
            <option value="english">English</option>
            <option value="vietnamese">Vietnamese</option>
          </select>
        </div>
      </div>

      <!-- Footer actions -->
      <footer class="app-footer">
        <button type="button" id="reset-keys-btn" class="footer-btn">Reset Keys</button>
        <span class="footer-sep">&middot;</span>
        <button type="button" id="settings-btn" class="footer-btn">Settings</button>
        <span class="footer-sep">&middot;</span>
        <button type="button" id="quit-btn" class="footer-btn footer-btn--danger">Quit</button>
      </footer>
    </div>

    <!-- Settings Dialog -->
    <div id="settings-overlay" class="dialog-overlay hidden" aria-hidden="true">
      <div class="dialog-box settings-dialog" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div id="settings-title" class="dialog-title">Settings</div>

        <div class="settings-scroll">
          <!-- Terms section -->
          <div class="settings-section">
            <div class="settings-section-label">Terms</div>
            <div id="settings-terms-list" class="settings-list"></div>
            <div class="settings-add-row">
              <input type="text" id="settings-term-input" class="settings-input" placeholder="Add term..." />
              <button type="button" id="settings-term-add" class="settings-add-btn">Add</button>
            </div>
          </div>

          <!-- Translation Terms section -->
          <div class="settings-section">
            <div class="settings-section-label">Translation Terms</div>
            <div id="settings-trans-list" class="settings-list"></div>
            <div class="settings-add-row">
              <input type="text" id="settings-trans-source" class="settings-input settings-input-half" placeholder="Source" />
              <span class="settings-arrow">&rarr;</span>
              <input type="text" id="settings-trans-target" class="settings-input settings-input-half" placeholder="Target" />
              <button type="button" id="settings-trans-add" class="settings-add-btn">Add</button>
            </div>
          </div>
        </div>

        <!-- Footer -->
        <div class="settings-footer">
          <button type="button" id="settings-reset" class="dialog-btn-secondary">Reset</button>
          <div class="settings-footer-right">
            <button type="button" id="settings-cancel" class="dialog-btn-secondary">Cancel</button>
            <button type="button" id="settings-save" class="dialog-btn-primary">Save</button>
          </div>
        </div>
      </div>
    </div>

    <script src="soniox-defaults.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>

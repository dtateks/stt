<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src * wss:; media-src *"
    />
    <title>Voice Everywhere</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <!-- Drag handle -->
      <div class="drag-bar">
        <div class="drag-pill"></div>
      </div>

      <!-- Enter Mode Toggle -->
      <div class="section toggle-section">
        <label class="toggle-label" for="enter-mode-toggle">
          <span class="toggle-label-text">Enter Mode</span>
          <div class="toggle-switch">
            <input type="checkbox" id="enter-mode-toggle" checked />
            <span class="toggle-slider"></span>
          </div>
        </label>
      </div>

      <!-- Mic Button -->
      <div class="section mic-section">
        <button id="mic-btn" class="mic-button" title="Click to start listening">
          <div class="mic-ring"></div>
          <div class="mic-inner">
            <svg
              id="mic-icon"
              viewBox="0 0 24 24"
              width="28"
              height="28"
              fill="currentColor"
            >
              <path
                d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"
              />
              <path
                d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"
              />
            </svg>
          </div>
          <span id="mic-label" class="mic-label-text">Start</span>
        </button>
        <div id="status-text" class="status idle">Idle</div>
      </div>

      <!-- Live Transcript -->
      <div class="section card-section">
        <div class="section-header">
          <span class="section-title">Live Transcript</span>
          <div class="header-actions">
            <button id="edit-btn" class="icon-btn" title="Edit transcript" style="display:none;">
              <svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor">
                <path d="M11.13 1.47a1.5 1.5 0 0 1 2.12 0l1.28 1.28a1.5 1.5 0 0 1 0 2.12L5.9 13.5 1.5 14.5l1-4.4 8.63-8.63zM3.35 10.35l-.6 2.6 2.6-.6 7.78-7.78-2-2-7.78 7.78z"/>
              </svg>
            </button>
            <button id="clear-btn" class="text-btn" title="Clear transcript">
              Clear
            </button>
          </div>
        </div>
        <div id="transcript" class="transcript-box" contenteditable="false" spellcheck="false">
          <span class="placeholder">Transcript will appear here...</span>
        </div>
      </div>

      <!-- Corrected Text -->
      <div class="section card-section">
        <div class="section-header">
          <span class="section-title">Corrected Text</span>
          <div class="header-actions">
            <button id="copy-btn" class="icon-btn" disabled title="Copy to clipboard">
              <svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor">
                <path d="M4 4v-2a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2v2a2 2 0 0 1-2 2h-6a2 2 0 0 1-2-2v-6a2 2 0 0 1 2-2h2zm2 0h4a2 2 0 0 1 2 2v4h0a1 1 0 0 0 1-1v-6a1 1 0 0 0-1-1h-6a1 1 0 0 0-1 1v0zm-3 2a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-6a1 1 0 0 0-1-1h-6z"/>
              </svg>
            </button>
          </div>
        </div>
        <div id="command-box" class="command-box">
          <span class="placeholder">&mdash;</span>
        </div>
      </div>

      <!-- Footer actions -->
      <div class="footer-section">
        <button id="reset-keys-btn" class="footer-btn">Reset API Keys</button>
        <span class="footer-sep">&middot;</span>
        <button id="settings-btn" class="footer-btn">Settings</button>
        <span class="footer-sep">&middot;</span>
        <button id="quit-btn" class="footer-btn footer-btn--danger">Quit</button>
      </div>
    </div>

    <!-- API Key Error Dialog -->
    <div id="key-error-overlay" class="dialog-overlay" style="display:none;">
      <div class="dialog-box">
        <div class="dialog-icon">&#9888;</div>
        <div class="dialog-title">Invalid API Key</div>
        <div id="key-error-msg" class="dialog-msg"></div>
        <div class="dialog-actions">
          <button id="key-error-reset" class="dialog-btn-primary">Update Keys</button>
          <button id="key-error-dismiss" class="dialog-btn-secondary">Dismiss</button>
        </div>
      </div>
    </div>

    <!-- Skip LLM Dialog (xAI auth failed) -->
    <div id="skip-llm-overlay" class="dialog-overlay" style="display:none;">
      <div class="dialog-box">
        <div class="dialog-icon">&#9889;</div>
        <div class="dialog-title">xAI Key Error</div>
        <div id="skip-llm-msg" class="dialog-msg"></div>
        <div class="dialog-actions">
          <button id="skip-llm-yes" class="dialog-btn-primary">Skip LLM Correction</button>
          <button id="skip-llm-update" class="dialog-btn-secondary">Update API Key</button>
        </div>
        <label class="dialog-checkbox">
          <input type="checkbox" id="skip-llm-remember" />
          <span>Don't ask again</span>
        </label>
      </div>
    </div>

    <!-- Settings Dialog -->
    <div id="settings-overlay" class="dialog-overlay" style="display:none;">
      <div class="dialog-box settings-dialog">
        <div class="dialog-title">Settings</div>

        <!-- Terms section -->
        <div class="settings-section">
          <div class="settings-section-label">Terms (vocabulary boost)</div>
          <div id="settings-terms-list" class="settings-list"></div>
          <div class="settings-add-row">
            <input type="text" id="settings-term-input" class="settings-input" placeholder="Add term..." />
            <button id="settings-term-add" class="settings-add-btn">Add</button>
          </div>
        </div>

        <!-- Translation Terms section -->
        <div class="settings-section">
          <div class="settings-section-label">Translation Terms (phonetic corrections)</div>
          <div id="settings-trans-list" class="settings-list"></div>
          <div class="settings-add-row">
            <input type="text" id="settings-trans-source" class="settings-input settings-input-half" placeholder="Source..." />
            <span class="settings-arrow">&#8594;</span>
            <input type="text" id="settings-trans-target" class="settings-input settings-input-half" placeholder="Target..." />
            <button id="settings-trans-add" class="settings-add-btn">Add</button>
          </div>
        </div>

        <!-- Footer -->
        <div class="settings-footer">
          <button id="settings-reset" class="dialog-btn-secondary">Reset to Defaults</button>
          <div class="settings-footer-right">
            <button id="settings-cancel" class="dialog-btn-secondary">Cancel</button>
            <button id="settings-save" class="dialog-btn-primary">Save</button>
          </div>
        </div>
      </div>
    </div>

    <script src="stt.js"></script>
    <script src="stopword.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
